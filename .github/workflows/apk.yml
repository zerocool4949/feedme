name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm --prefix frontend run build
        env:
          VITE_API_BASE_URL: https://feedme.lyranet.xyz/api

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Create keystore.properties
        run: |
          cat > android/keystore.properties <<EOF
          storeFile=../feedme-release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=feedme
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build release APK
        run: ./gradlew assembleRelease
        working-directory: android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: feedme-apk
          path: android/app/build/outputs/apk/release/feedme-*.apk
          retention-days: 30
