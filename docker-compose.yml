services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-feedme}
      POSTGRES_USER: ${POSTGRES_USER:-feedme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-feedme_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-feedme} -d ${POSTGRES_DB:-feedme}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/zerocool4949/feedme-backend:main
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://feedme:feedme_password@postgres:5432/feedme?schema=public}
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ghcr.io/zerocool4949/feedme-frontend:main
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-2323}:80"
    depends_on:
      - backend

  recipe-importer:
    image: node:22-alpine
    profiles:
      - tools
    working_dir: /app
    environment:
      FEEDME_API_BASE_URL: http://backend:3000/api
      FEEDME_RECIPE_DIR: /app/receip
    volumes:
      - ./scripts:/app/scripts:ro
      - ./receip:/app/receip:ro
    command: node scripts/import-receip-local.mjs
    depends_on:
      - backend

volumes:
  postgres_data:
